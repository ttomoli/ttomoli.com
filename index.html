<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tommaso Tomoli</title>
  <meta name="description" content="Tommaso Tomoli — Education executive, operator, builder. MD & CEO at neue fische & SPICED Academy.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --text: #1a1a1a;
      --text-secondary: #555;
      --text-muted: #888;
      --bg: #fafafa;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --border: #e5e5e5;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 600px;
      width: 100%;
    }

    /* ─── Photo ─── */
    .photo {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: #ddd;
      margin-bottom: 32px;
      overflow: hidden;
      border: 3px solid #fff;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* ─── Name ─── */
    h1 {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .role {
      font-size: 16px;
      color: var(--text-secondary);
      font-weight: 400;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .role strong {
      font-weight: 500;
      color: var(--text);
    }

    /* ─── Bio ─── */
    .bio {
      font-size: 15px;
      line-height: 1.7;
      color: var(--text-secondary);
      margin-bottom: 32px;
    }

    /* ─── Tags ─── */
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 32px;
    }
    .tag {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      background: #f0f0f0;
      padding: 5px 12px;
      border-radius: 20px;
      letter-spacing: 0.2px;
    }

    /* ─── Links ─── */
    .links {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .link {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      border: 1px solid var(--border);
      border-radius: 10px;
      text-decoration: none;
      color: var(--text);
      font-size: 14px;
      font-weight: 500;
      background: #fff;
      transition: all 0.15s ease;
    }
    .link:hover {
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 2px 8px rgba(37,99,235,0.08);
      transform: translateY(-1px);
    }
    .link-icon {
      font-size: 18px;
      width: 24px;
      text-align: center;
    }
    .link-label {
      flex: 1;
    }
    .link-arrow {
      color: var(--text-muted);
      font-size: 12px;
    }

    /* ─── Footer ─── */
    .footer {
      margin-top: 48px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-muted);
    }

    /* ─── Responsive ─── */
    @media (max-width: 480px) {
      h1 { font-size: 26px; }
      .role { font-size: 14px; }
      .bio { font-size: 14px; }
      .photo { width: 96px; height: 96px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="photo">
      <!-- Replace with actual photo -->
      <img src="photo.jpg" alt="Tommaso Tomoli" onerror="this.parentElement.innerHTML='<div style=&quot;width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-size:36px;font-weight:600&quot;>TT</div>'">
    </div>
    
    <h1>Tommaso Tomoli</h1>
    
    <p class="role">
      CEO at <strong>neue fische</strong> & <strong>SPICED Academy</strong><br>
      Building the future of professional education in Europe
    </p>

    <div class="links">
      <a href="https://www.linkedin.com/in/tommaso-tomoli-895b2117" target="_blank" class="link">
        <span class="link-icon">💼</span>
        <span class="link-label">LinkedIn</span>
        <span class="link-arrow">→</span>
      </a>
      <a href="https://www.neuefische.de" target="_blank" class="link">
        <span class="link-icon">🐟</span>
        <span class="link-label">neue fische</span>
        <span class="link-arrow">→</span>
      </a>
      <a href="https://www.spiced-academy.com" target="_blank" class="link">
        <span class="link-icon">🌶️</span>
        <span class="link-label">SPICED Academy</span>
        <span class="link-arrow">→</span>
      </a>
      <a href="mailto:ttomoli@yahoo.it" class="link">
        <span class="link-icon">✉️</span>
        <span class="link-label">Get in touch</span>
        <span class="link-arrow">→</span>
      </a>
    </div>

    <div class="footer">
      Milan · Berlin · Everywhere in between
    </div>
  </div>
</body>
</html>
